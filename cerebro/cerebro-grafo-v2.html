    #canvas {
      flex: 1;

    }

    h1 {
      font-size: 22px;
      margin-bottom: 5px;
      color: #4ade80;
    }

    .subtitle {
      font-size: 12px;
      color: #888;
      margin-bottom: 20px;
      border-bottom: 1px solid #2d3561;
      padding-bottom: 15px;
    }

    .search-box {
      width: 100%;
      padding: 10px 12px;
      background: #0f1425;
      border: 1px solid #2d3561;
      border-radius: 6px;
      color: #e0e0e0;
      margin-bottom: 20px;
      font-size: 13px;
    }

    .search-box::placeholder {
      color: #666;
    }

    .section-title {
      font-size: 12px;
      font-weight: bold;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 20px;
      margin-bottom: 10px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: #0f1425;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #2d3561;
      text-align: center;
    }

    .stat-label {
      font-size: 11px;
      color: #888;
      margin-bottom: 5px;
    }

    .stat-value {
      font-size: 18px;
      font-weight: bold;
      color: #4ade80;
    }

    .filter-group {
      margin-bottom: 15px;
    }

    .filter-item {
      display: flex;
      align-items: center;
      padding: 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }

    .filter-item:hover {
      background: #2d3561;
    }

    .filter-checkbox {
      width: 16px;
      height: 16px;
      margin-right: 8px;
      cursor: pointer;
      accent-color: #4ade80;
    }

    .node-info {
      background: #0f1425;
      border: 1px solid #2d3561;
      border-radius: 6px;
      padding: 12px;
      margin-top: 20px;
      display: none;
    }

    .node-info.active {
      display: block;
    }

    .node-info-title {
      color: #4ade80;
      font-weight: bold;
      margin-bottom: 8px;
      word-break: break-word;
    }

    .node-info-path {
      font-size: 11px;
      color: #888;
      word-break: break-all;
      margin-bottom: 10px;
      font-family: 'Courier New', monospace;
    }

    .node-info-links {
      font-size: 12px;
      color: #ccc;
    }

    .node-info-links-title {
      color: #aaa;
      font-weight: bold;
      margin-bottom: 5px;
      font-size: 11px;
    }

    .connection-list {
      list-style: none;
      margin-top: 8px;
      max-height: 150px;
      overflow-y: auto;
    }

    .connection-list li {
      padding: 4px 0;
      font-size: 11px;
      color: #999;
      border-left: 2px solid #4ade80;
      padding-left: 6px;
    }

    .controls {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(15, 20, 37, 0.95);
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #2d3561;
      font-size: 12px;
      color: #ccc;
    }

    .control-hint {
      margin: 4px 0;
      color: #888;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #0f1425;
    }

    ::-webkit-scrollbar-thumb {
      background: #2d3561;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #3d4571;
    }

    .legend {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #2d3561;
    }

    .legend-item {
      display: flex;
      align-items: center;
      font-size: 11px;
      margin-bottom: 8px;
    }

    .legend-color {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 8px;

      ],
      "edges": [
        {"from": "fluxo-13-etapas", "to": "template-aprendizado", "label": "referencia"},
        {"from": "roadmap", "to": "fluxo-13-etapas", "label": "conecta"},

        {"from": "template-roteiro-literario", "to": "template-roteiro-tecnico", "label": "desdobra"},
        {"from": "fac2026-base", "to": "fac2026-edital", "label": "fundamenta"},
        {"from": "fac2026-bloco-b", "to": "fac2026-bloco-c", "label": "sequencia"},
        {"from": "marketing-fundamentos", "to": "trafego-pago", "label": "fundamenta"},
        {"from": "trafego-pago", "to": "conteudo-organico", "label": "complementa"},
        {"from": "copywriting", "to": "vendas-conversao", "label": "aplicacao"},
        {"from": "email-marketing", "to": "marketing-fundamentos", "label": "tecnica_de"},
        {"from": "diretores-cinematografos", "to": "filmes-referencias", "label": "estuda"},
        {"from": "tecnicas-visuais", "to": "moodboards", "label": "evidencia"},
        {"from": "esteticas-nicho", "to": "tecnicas-assinatura-firma", "label": "especializa"},
        {"from": "subagentes", "to": "fase2-implementacao", "label": "modulo_de"},
        {"from": "arquitetura-notion", "to": "memoria", "label": "estrutura"},
        {"from": "fluxo-trabalho", "to": "regras-negocio", "label": "operacionaliza"},
        {"from": "contexto-firma", "to": "dna-firma", "label": "contextualiza"},
        {"from": "template-briefing-cliente", "to": "template-projeto-audiovisual", "label": "antecede"},
        {"from": "template-log-filmagem", "to": "template-analise-tecnica", "label": "coleta_para"},
        {"from": "template-boletim-camera", "to": "template-log-filmagem", "label": "alimenta"},
        {"from": "template-ficha-continuidade", "to": "template-boletim-camera", "label": "coordena"},
        {"from": "template-autorizacoes", "to": "template-projeto-audiovisual", "label": "requisito_de"},
        {"from": "template-ordem-dia", "to": "template-boletim-camera", "label": "guia"},
        {"from": "adm-financeiro-index", "to": "tabela-precos", "label": "referencia"},
        {"from": "pre-producao-index", "to": "template-briefing-cliente", "label": "inclui"},
        {"from": "producao-set-index", "to": "template-log-filmagem", "label": "inclui"},
        {"from": "pos-producao-index", "to": "template-analise-tecnica", "label": "inclui"},
        {"from": "marketing-crm-index", "to": "conteudo-organico", "label": "referencia"},
        {"from": "fac2026-plano-execucao", "to": "fac2026-bloco-b", "label": "detalha"},
        {"from": "fac2026-sumario-preparacao", "to": "fac2026-checklist", "label": "resume"},
        {"from": "maranha-briefing", "to": "maranha-roteiro", "label": "orienta"},
        {"from": "maranha-roteiro", "to": "maranha-diario-set", "label": "executa"},
        {"from": "brasil-participativo-briefing", "to": "brasil-participativo-info", "label": "documenta"},
        {"from": "rnp-ailton-briefing", "to": "operacao-index", "label": "segue"},
        {"from": "simbiose-briefing", "to": "operacao-index", "label": "segue"},
        {"from": "home", "to": "operacao-index", "label": "aponta"}
      ]
    };

    // Mapeamento de categorias para cores
    const categoryColors = {
      '00-HOME': '#ff6b6b',
      '00-INBOX': '#ffd93d',
      '01-OPERACAO': '#ff6b6b',
      '02-PROCESSOS': '#ffd93d',
      '03-CLIENTES': '#a78bfa',
      '04-PROJETOS': '#4ecdc4',
      '05-ARQUIVO': '#95a5a6',
      '06-ESTUDOS': '#6bcf7f',
      '07-LOGS': '#f39c12'
    };

    // Setup SVG
    const width = document.getElementById('canvas').clientWidth;
    const height = document.getElementById('canvas').clientHeight;

    const svg = d3.select('#canvas').append('svg')
      .attr('width', width)
      .attr('height', height);

    const g = svg.append('g');

    // Zoom
    const zoom = d3.zoom().on('zoom', (event) => {
      g.attr('transform', event.transform);
    });
    svg.call(zoom);

    // Simulação
    const simulation = d3.forceSimulation(graphData.nodes)
      .force('link', d3.forceLink(graphData.edges)
        .id(d => d.id)
        .distance(120)
        .strength(0.1))
      .force('charge', d3.forceManyBody().strength(-400))
      .force('center', d3.forceCenter(width / 2, height / 2))
      .force('collision', d3.forceCollide().radius(25));

    // Desenhar links
    const link = g.selectAll('line')
      .data(graphData.edges)
      .enter()
      .append('line')
      .attr('stroke', '#3d4571')
      .attr('stroke-width', 1)
      .attr('opacity', 0.4);

    // Desenhar nós
    const node = g.selectAll('circle')
      .data(graphData.nodes)
      .enter()
      .append('circle')
      .attr('r', 10)
      .attr('fill', d => categoryColors[d.category] || '#888')
      .attr('opacity', 0.85)
      .attr('stroke', '#fff')
      .attr('stroke-width', 2)
      .call(d3.drag()
        .on('start', dragstarted)
        .on('drag', dragged)
        .on('end', dragended))
      .on('click', (event, d) => showNodeInfo(d))
      .on('mouseover', (event, d) => {
        d3.select(event.currentTarget)
          .transition()
          .attr('r', 14)
          .attr('opacity', 1);
      })
      .on('mouseout', (event, d) => {
        d3.select(event.currentTarget)
          .transition()
          .attr('r', 10)
          .attr('opacity', 0.85);
      });

    // Desenhar labels
    const labels = g.selectAll('text')
      .data(graphData.nodes)
      .enter()
      .append('text')
      .attr('text-anchor', 'middle')
      .attr('dy', '.35em')
      .attr('font-size', '9px')
      .attr('fill', '#ccc')
      .attr('pointer-events', 'none')
      .text(d => d.label.substring(0, 12));

    // Simulação tick
    simulation.on('tick', () => {
      link
        .attr('x1', d => d.source.x)
        .attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x)
        .attr('y2', d => d.target.y);

      node
        .attr('cx', d => d.x)
        .attr('cy', d => d.y);

      labels
        .attr('x', d => d.x)
        .attr('y', d => d.y);
    });

    // Funções de interação
    function dragstarted(event, d) {
      if (!event.active) simulation.alphaTarget(0.3).restart();
      d.fx = d.x;
      d.fy = d.y;
    }

    function dragged(event, d) {
      d.fx = event.x;
      d.fy = event.y;
    }

    function dragended(event, d) {
      if (!event.active) simulation.alphaTarget(0);
      d.fx = null;
      d.fy = null;
    }

    function showNodeInfo(d) {
      const nodeInfoDiv = document.getElementById('nodeInfo');
      document.getElementById('nodeTitle').textContent = d.label;
      document.getElementById('nodePath').textContent = d.path;

      const connections = graphData.edges.filter(e => e.from === d.id || e.to === d.id);
      const connectionsList = document.getElementById('nodeConnections');
      connectionsList.innerHTML = '';

      connections.forEach(conn => {
        const targetId = conn.from === d.id ? conn.to : conn.from;
        const targetNode = graphData.nodes.find(n => n.id === targetId);
        const li = document.createElement('li');
        li.textContent = `→ ${targetNode.label}`;
        connectionsList.appendChild(li);
      });

      nodeInfoDiv.classList.add('active');
    }

    // Busca
    document.getElementById('search').addEventListener('input', (e) => {
      const query = e.target.value.toLowerCase();
      node.attr('opacity', d => {
        return d.label.toLowerCase().includes(query) || d.id.includes(query) ? 1 : 0.1;
      });
      labels.attr('opacity', d => {
        return d.label.toLowerCase().includes(query) || d.id.includes(query) ? 1 : 0.1;
      });
    });

    // Criar filtros
    const categories = [...new Set(graphData.nodes.map(n => n.category))].sort();
    const filterContainer = document.getElementById('filterContainer');

    categories.forEach(cat => {
      const label = document.createElement('label');
      label.className = 'filter-item';

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.className = 'filter-checkbox';
      checkbox.checked = true;
      checkbox.value = cat;

      checkbox.addEventListener('change', () => {
        const checked = Array.from(document.querySelectorAll('.filter-checkbox:checked')).map(c => c.value);
        node.attr('opacity', d => {
          return checked.includes(d.category) ? 0.85 : 0.1;
        });
        labels.attr('opacity', d => {
          return checked.includes(d.category) ? 1 : 0.1;
        });
      });

      label.appendChild(checkbox);
      label.appendChild(document.createTextNode(cat.substring(3)));
      filterContainer.appendChild(label);
    });
  </script>
